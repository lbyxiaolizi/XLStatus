# Simple Docker Compose for XLStatus - Server Only
# For full stack (server + web + agent), use docker-compose.yml

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: xlstatus-server
    ports:
      - "127.0.0.1:8080:8080"
      - "50051:50051"
    volumes:
      - xlstatus-data:/data
    environment:
      - DATABASE_URL=sqlite:///data/xlstatus.db?mode=rwc
      - DATABASE_CREATE_IF_MISSING=true
      - RUST_LOG=info
      - HTTP_BIND=0.0.0.0:8080
      - GRPC_BIND=0.0.0.0:50051
      - CORS_ALLOWED_ORIGINS=${XLSTATUS_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET to a long random value}
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY:-}
      - XLSTATUS_SEED_ADMIN_USERNAME=${XLSTATUS_SEED_ADMIN_USERNAME:-admin}
      - XLSTATUS_SEED_ADMIN_PASSWORD_FILE=/run/secrets/xlstatus_seed_admin_password
    secrets:
      - xlstatus_seed_admin_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  xlstatus-data:
    driver: local

secrets:
  xlstatus_seed_admin_password:
    file: ./.secrets/xlstatus_seed_admin_password
