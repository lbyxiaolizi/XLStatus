services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: xlstatus-server
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite:///data/xlstatus.db?mode=rwc
      - DATABASE_CREATE_IF_MISSING=true
      - RUST_LOG=info
      - HTTP_BIND=0.0.0.0:8080
      - GRPC_BIND=0.0.0.0:50051
      - CORS_ALLOWED_ORIGINS=${XLSTATUS_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET to a long random value}
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY:-}
      - XLSTATUS_SEED_ADMIN_USERNAME=${XLSTATUS_SEED_ADMIN_USERNAME:-admin}
      - XLSTATUS_SEED_ADMIN_PASSWORD=${XLSTATUS_SEED_ADMIN_PASSWORD:?set XLSTATUS_SEED_ADMIN_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${XLSTATUS_PUBLIC_API_URL:-}
    container_name: xlstatus-web
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${XLSTATUS_PUBLIC_API_URL:-}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  agent-demo:
    profiles: ["agent-demo"]
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: xlstatus-agent-demo
    environment:
      - SERVER_URL=http://server:8080
      - GRPC_SERVER=http://server:50051
      - AGENT_NAME=demo-agent
      - RUST_LOG=info
    volumes:
      - ./data/agent-demo:/etc/xlstatus-agent:ro
    command: ["xlstatus-agent", "run", "--config", "/etc/xlstatus-agent/agent.json"]
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
