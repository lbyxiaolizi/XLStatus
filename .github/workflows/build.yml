name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    name: Rust check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler sqlite3 binutils
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check
      - name: Check workspace
        run: cargo check --workspace
      - name: Test workspace
        run: cargo test --workspace

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: NEXT_PUBLIC_API_URL=http://localhost:8080 pnpm build

  release-binaries:
    name: ${{ matrix.os_name }} ${{ matrix.arch }} release binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    needs:
      - rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: linux
            arch: x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
            use_zigbuild: false
            verify_glibc: true
          - os_name: linux
            arch: arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary_ext: ""
            use_zigbuild: false
            verify_glibc: true
          - os_name: linux
            arch: i386
            runner: ubuntu-22.04
            target: i686-unknown-linux-gnu
            binary_ext: ""
            use_zigbuild: true
            verify_glibc: false
          - os_name: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
            msvc_arch: x64
            use_zigbuild: false
            verify_glibc: false
          - os_name: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary_ext: ".exe"
            msvc_arch: arm64
            use_zigbuild: false
            verify_glibc: false
          - os_name: windows
            arch: i386
            runner: windows-latest
            target: i686-pc-windows-msvc
            binary_ext: ".exe"
            msvc_arch: x86
            use_zigbuild: false
            verify_glibc: false
          - os_name: darwin
            arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_ext: ""
            use_zigbuild: false
            verify_glibc: false
          - os_name: darwin
            arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin
            binary_ext: ""
            use_zigbuild: false
            verify_glibc: false
          - os_name: freebsd
            arch: x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-freebsd
            binary_ext: ""
            use_zigbuild: true
            verify_glibc: false
          - os_name: freebsd
            arch: i386
            runner: ubuntu-22.04
            target: i686-unknown-freebsd
            binary_ext: ""
            use_zigbuild: true
            verify_glibc: false
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y binutils protobuf-compiler
      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          if ! command -v protoc >/dev/null 2>&1; then
            brew install protobuf
          fi
      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command protoc.exe -ErrorAction SilentlyContinue)) {
            choco install protoc --no-progress -y
          }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@cargo-zigbuild
      - name: Install Zig
        if: matrix.use_zigbuild
        shell: bash
        run: |
          set -euo pipefail
          zig_version="0.16.0"
          case "$(uname -m)" in
            x86_64) zig_arch="x86_64" ;;
            aarch64|arm64) zig_arch="aarch64" ;;
            *) echo "::error::Unsupported Zig host architecture: $(uname -m)"; exit 1 ;;
          esac
          zig_dir="$RUNNER_TEMP/zig"
          mkdir -p "$zig_dir"
          curl -fsSL "https://ziglang.org/download/${zig_version}/zig-linux-${zig_arch}-${zig_version}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$zig_dir" --strip-components=1
          echo "$zig_dir" >> "$GITHUB_PATH"
          "$zig_dir/zig" version
      - name: Build release binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target "${{ matrix.target }}" --bin xlstatus-server --bin xlstatus-agent
          else
            cargo build --release --target "${{ matrix.target }}" --bin xlstatus-server --bin xlstatus-agent
          fi
      - name: Build release binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio C++ build tools not found"
          }
          $devCmd = Join-Path $vsInstall "Common7\Tools\VsDevCmd.bat"
          cmd /c "`"$devCmd`" -arch=${{ matrix.msvc_arch }} && cargo build --release --target `"${{ matrix.target }}`" --bin xlstatus-server --bin xlstatus-agent"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      - name: Verify glibc compatibility
        if: matrix.verify_glibc
        run: |
          set -euo pipefail
          max_allowed="2.36"
          for bin in "target/${{ matrix.target }}/release/xlstatus-server" "target/${{ matrix.target }}/release/xlstatus-agent"; do
            versions="$(readelf --version-info "$bin" | grep -Eo 'GLIBC_[0-9]+(\.[0-9]+)+' | sed 's/GLIBC_//' | sort -Vu || true)"
            max_seen="$(printf '%s\n' "$versions" | tail -n1)"
            echo "$bin max GLIBC version: ${max_seen:-none}"
            if [ -n "$max_seen" ] && [ "$(printf '%s\n%s\n' "$max_allowed" "$max_seen" | sort -V | tail -n1)" != "$max_allowed" ]; then
              echo "::error::$bin requires GLIBC_$max_seen, higher than GLIBC_$max_allowed"
              exit 1
            fi
          done
      - name: Package artifacts
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/xlstatus-server${{ matrix.binary_ext }}" "dist/xlstatus-server-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.binary_ext }}"
          cp "target/${{ matrix.target }}/release/xlstatus-agent${{ matrix.binary_ext }}" "dist/xlstatus-agent-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.binary_ext }}"
          if [ "${{ matrix.os_name }}" = "linux" ] && [ "${{ matrix.arch }}" = "x86_64" ]; then
            cp deploy/install.sh dist/install-server.sh
            cp deploy/install-agent.sh dist/install-agent.sh
          fi
          chmod +x dist/* || true
      - name: Package artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/xlstatus-server${{ matrix.binary_ext }}" "dist/xlstatus-server-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.binary_ext }}"
          Copy-Item "target/${{ matrix.target }}/release/xlstatus-agent${{ matrix.binary_ext }}" "dist/xlstatus-agent-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.binary_ext }}"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: xlstatus-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - release-binaries
      - web
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          overwrite_files: true
          files: dist/*
