name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    name: Rust check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler sqlite3 binutils
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check
      - name: Check workspace
        run: cargo check --workspace
      - name: Test workspace
        run: cargo test --workspace

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: NEXT_PUBLIC_API_URL=http://localhost:8080 pnpm build

  release-binaries:
    name: ${{ matrix.os_name }} ${{ matrix.arch }} release binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    needs:
      - rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: linux
            arch: x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
            use_zigbuild: false
            verify_glibc: true
          - os_name: linux
            arch: arm64
            runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            binary_ext: ""
            use_zigbuild: true
            verify_glibc: false
          - os_name: linux
            arch: i386
            runner: ubuntu-22.04
            target: i686-unknown-linux-gnu
            binary_ext: ""
            use_zigbuild: true
            verify_glibc: false
          - os_name: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
            msvc_arch: x64
            use_zigbuild: false
            verify_glibc: false
          - os_name: windows
            arch: arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            binary_ext: ".exe"
            msvc_arch: amd64_arm64
            use_zigbuild: false
            verify_glibc: false
          - os_name: windows
            arch: i386
            runner: windows-latest
            target: i686-pc-windows-msvc
            binary_ext: ".exe"
            msvc_arch: x86
            use_zigbuild: false
            verify_glibc: false
          - os_name: darwin
            arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_ext: ""
            use_zigbuild: false
            verify_glibc: false
          - os_name: darwin
            arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin
            binary_ext: ""
            use_zigbuild: false
            verify_glibc: false
          - os_name: freebsd
            arch: x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-freebsd
            binary_ext: ""
            use_zigbuild: true
            verify_glibc: false
          - os_name: freebsd
            arch: i386
            runner: ubuntu-22.04
            target: i686-unknown-freebsd
            binary_ext: ""
            use_zigbuild: true
            verify_glibc: false
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y binutils
      - name: Configure MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@cargo-zigbuild
      - name: Install Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target "${{ matrix.target }}" --bin xlstatus-server --bin xlstatus-agent
          else
            cargo build --release --target "${{ matrix.target }}" --bin xlstatus-server --bin xlstatus-agent
          fi
      - name: Verify glibc compatibility
        if: matrix.verify_glibc
        run: |
          set -euo pipefail
          max_allowed="2.36"
          for bin in "target/${{ matrix.target }}/release/xlstatus-server" "target/${{ matrix.target }}/release/xlstatus-agent"; do
            versions="$(readelf --version-info "$bin" | grep -Eo 'GLIBC_[0-9]+(\.[0-9]+)+' | sed 's/GLIBC_//' | sort -Vu || true)"
            max_seen="$(printf '%s\n' "$versions" | tail -n1)"
            echo "$bin max GLIBC version: ${max_seen:-none}"
            if [ -n "$max_seen" ] && [ "$(printf '%s\n%s\n' "$max_allowed" "$max_seen" | sort -V | tail -n1)" != "$max_allowed" ]; then
              echo "::error::$bin requires GLIBC_$max_seen, higher than GLIBC_$max_allowed"
              exit 1
            fi
          done
      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/xlstatus-server${{ matrix.binary_ext }}" "dist/xlstatus-server-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.binary_ext }}"
          cp "target/${{ matrix.target }}/release/xlstatus-agent${{ matrix.binary_ext }}" "dist/xlstatus-agent-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.binary_ext }}"
          if [ "${{ matrix.os_name }}" = "linux" ] && [ "${{ matrix.arch }}" = "x86_64" ]; then
            cp deploy/install.sh dist/install-server.sh
            cp deploy/install-agent.sh dist/install-agent.sh
          fi
          chmod +x dist/* || true
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xlstatus-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - release-binaries
      - web
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: dist/*
