# XLStatus server configuration example
# Copy this file to config.toml and customize it for your environment.

[database]
# SQLite example:
url = "sqlite:///var/lib/xlstatus/xlstatus.db?mode=rwc"
# When true, XLStatus creates the SQLite file and parent directory on first boot.
# `?mode=rwc` in the URL also enables creation.
create_if_missing = true
# PostgreSQL example:
# url = "postgresql://xlstatus:xlstatus_password@localhost:5432/xlstatus"
# create_if_missing = false

[server]
http_bind = "0.0.0.0:8080"
grpc_bind = "0.0.0.0:50051"

[security]
# Generate a production secret with:
# openssl rand -base64 32
session_secret = "replace-with-a-long-random-secret"
session_ttl_hours = 24
