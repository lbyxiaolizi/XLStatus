services:
  postgres:
    image: postgres:15
    container_name: xlstatus-postgres
    environment:
      - POSTGRES_USER=xlstatus
      - POSTGRES_PASSWORD=xlstatus_password
      - POSTGRES_DB=xlstatus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xlstatus"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: xlstatus-server
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - DATABASE_URL=postgresql://xlstatus:xlstatus_password@postgres:5432/xlstatus
      - RUST_LOG=info
      - HTTP_BIND=0.0.0.0:8080
      - GRPC_BIND=0.0.0.0:50051
      - CORS_ALLOWED_ORIGINS=${XLSTATUS_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - SESSION_SECRET=change-me-in-production
      - XLSTATUS_SEED_ADMIN_USERNAME=admin
      - XLSTATUS_SEED_ADMIN_PASSWORD=admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${XLSTATUS_PUBLIC_API_URL:-}
    container_name: xlstatus-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${XLSTATUS_PUBLIC_API_URL:-}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  agent-demo:
    profiles: ["agent-demo"]
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: xlstatus-agent-demo
    environment:
      - SERVER_URL=http://server:8080
      - GRPC_SERVER=http://server:50051
      - AGENT_NAME=demo-agent
      - RUST_LOG=info
    volumes:
      - ./data/agent-demo:/etc/xlstatus-agent:ro
    command: ["xlstatus-agent", "run", "--config", "/etc/xlstatus-agent/agent.json"]
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
