name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    name: Rust check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler sqlite3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check
      - name: Check workspace
        run: cargo check --workspace
      - name: Test workspace
        run: cargo test --workspace

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: NEXT_PUBLIC_API_URL=http://localhost:8080 pnpm build

  linux-x86-64:
    name: Linux x86_64 release binaries
    runs-on: ubuntu-latest
    needs:
      - rust
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler sqlite3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: cargo build --release --bin xlstatus-server --bin xlstatus-agent
      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/release/xlstatus-server dist/xlstatus-server-linux-x86_64
          cp target/release/xlstatus-agent dist/xlstatus-agent-linux-x86_64
          cp deploy/install.sh dist/install-server.sh
          cp deploy/install-agent.sh dist/install-agent.sh
          chmod +x dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xlstatus-linux-x86_64
          path: dist/*

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-x86-64
      - web
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: dist/*
